<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>整批匯款管理系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div id="app" class="p-8 max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">匯款明細清單</h1>

        <div v-for="item in remittances" :key="item.id" class="border p-4 mb-2 flex justify-between items-center rounded bg-white shadow-sm">
            <div>
                <p class="font-bold">{{ item.accountName }}</p>
                <p class="text-gray-500">金額: ${{ item.amount }} | 狀態: <span class="text-blue-600">{{ getStatusText(item.status) }}</span></p>
            </div>
            <button @click="cancelItem(item.id)"
                    :disabled="item.status !== 0"
                    class="px-4 py-2 bg-red-500 text-white rounded disabled:bg-gray-300">
                取消交易
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const remittances = ref([]);

                const loadRemittances = async () => {
                    try {
                        const response = await fetch('/api/remittance');
                        if (!response.ok) {
                            const text = await response.text();
                            window.alert(`讀取匯款清單失敗：${text}`);
                            return;
                        }
                        remittances.value = await response.json();
                    }
                    catch (error) {
                        window.alert(`讀取匯款清單失敗：${error.message}`);
                    }
                };

                const getStatusText = (status) => {
                    const map = { 0: '待覆核', 1: '交易中', 2: '已完成', 9: '已取消' };
                    return map[status] || '未知狀態';
                };

                const cancelItem = async (id) => {
                    const item = remittances.value.find(x => x.id === id);
                    if (!item || item.status !== 0) {
                        return;
                    }

                    try {
                        const response = await fetch(`/api/remittance/${id}/cancel`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        });

                        const text = await response.text();

                        if (!response.ok) {
                            window.alert(`取消失敗：${text}`);
                            return;
                        }

                        item.status = 9;
                        window.alert(`取消成功：${text}`);
                        await loadRemittances();
                    }
                    catch (error) {
                        window.alert(`取消失敗：${error.message}`);
                    }
                };

                loadRemittances();

                return { remittances, getStatusText, cancelItem };
            }
        }).mount('#app');
    </script>
</body>
</html>
