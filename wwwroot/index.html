<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>整批匯款管理系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div id="app" class="p-8 max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">匯款明細清單</h1>

        <div v-for="item in remittances" :key="item.id" class="border p-4 mb-2 flex justify-between items-center rounded bg-white shadow-sm">
            <div>
                <p class="font-bold">{{ item.accountName }}</p>
                <p class="text-gray-500">金額: ${{ item.amount }} | 狀態: <span class="text-blue-600">{{ getStatusText(item.status) }}</span></p>
            </div>
            <button @click="cancelItem(item.id)"
                    :disabled="item.status !== 0"
                    class="px-4 py-2 bg-red-500 text-white rounded disabled:bg-gray-300">
                取消交易
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                // 已提供靜態資料，不需寫 GET API
                const remittances = ref([
                    { id: 1, accountName: "測試企業A", amount: 50000, status: 0 },
                    { id: 2, accountName: "測試企業B", amount: 12000, status: 1 }, // 不可取消
                    { id: 3, accountName: "測試企業C", amount: 30000, status: 0 }
                ]);

                const getStatusText = (status) => {
                    const map = { 0: '待覆核', 1: '交易中', 2: '已完成', 9: '已取消' };
                    return map[status] || '未知狀態';
                };

                // TODO: 請實作此函數
                const cancelItem = async (id) => {
                    // 1. 呼叫 POST API
                    // 2. 處理成功與失敗的回應
                    // 3. 成功後更新 remittances 中的狀態
                };

                return { remittances, getStatusText, cancelItem };
            }
        }).mount('#app');
    </script>
</body>
</html>
